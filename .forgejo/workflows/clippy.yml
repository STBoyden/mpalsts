name: Clippy

on:
  push:
  pull_request:

jobs:
  clippy:
    name: cargo clippy
    runs-on: docker-arm
    container:
      image: alpine:latest

    steps:
      - name: Setup runner
        run: |
          set -xeuo pipefail

          apk add --no-cache curl ca-certificates nodejs \
            musl-dev build-base git pkgconfig wayland-dev \
            fontconfig-dev cmake musl-utils tar

          update-ca-certificates

          echo "Processors: $(nproc)"

          echo "CC=$(which cc)" >> "$GITHUB_ENV"
          echo "PATH=$HOME/.cargo/bin:$PATH" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo downloads and build output
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.rustup
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

      - name: Install Rust
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Install Rust toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        run: rustup show

      - name: Run Clippy
        run: cargo clippy -j $(nproc) --workspace --all-targets --all-features -- -D warnings
